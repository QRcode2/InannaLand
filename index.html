<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 40px 20px;

  position: relative;
  overflow-x: hidden;

  background: linear-gradient(-45deg, #000000, #0a0a0a, #111111, #000000);
  background-size: 400% 400%;
  animation: backgroundMove 12s ease infinite;
}

/* خلفية متحركة */
@keyframes backgroundMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===== 🔥 لمعة قوية جدًا ===== */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;

  width: 180%;
  height: 100%;

  pointer-events: none;

  background: linear-gradient(
    120deg,
    transparent 0%,

    rgba(255,255,255,0.01) 20%,
    rgba(255,255,255,0.10) 40%,

    rgba(215,181,109,0.20) 50%,   /* ذهبي قوي جدًا */
    rgba(255,255,255,0.12) 55%,

    rgba(180,180,180,0.12) 60%,   /* رمادي واضح */
    rgba(255,255,255,0.05) 70%,

    transparent 100%
  );

  transform: translateX(-180%) skewX(-20deg);
  animation: shimmerMove 4s linear infinite;

  z-index: 0;
}

/* حركة اللمعة */
@keyframes shimmerMove {
  0% {
    transform: translateX(-180%) skewX(-20deg);
  }
  100% {
    transform: translateX(180%) skewX(-20deg);
  }
}

/* المحتوى فوق */
.container {
  position: relative;
  z-index: 2;
  max-width: 500px;
  margin: auto;
}

/* ===== LOGO ===== */
.logo {
  width:220px;
  height:220px;
  object-fit:cover;
  border-radius:50%;
  border:6px solid #D7B56D;

  background:none;
  padding:0;

  transition: all 0.4s ease;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.6),
    0 0 30px rgba(215,181,109,0.6);
}

.logo:hover {
  transform: scale(1.05) rotate(1deg);
  box-shadow:
    0 15px 40px rgba(0,0,0,0.8),
    0 0 40px rgba(215,181,109,0.9);
}

h1 {
  font-size:36px;
  margin-bottom:5px;
  color:#ffffff;
}

.subtitle {
  font-size:18px;
  color:#ccc;
  margin-bottom:30px;
}

/* ===== BUTTONS ===== */
.link-button {
  position: relative;
  display:flex;
  align-items:center;
  padding:16px 20px;

  background: linear-gradient(145deg, #f5d27a, #d7b56d, #b8964f);
  color:black;

  text-decoration:none;
  font-size:18px;
  border-radius:18px;
  margin:14px auto;
  max-width:420px;

  overflow: hidden;

  transition: all 0.35s ease;

  border: 1px solid rgba(255,255,255,0.3);
  outline: 1px solid rgba(0,0,0,0.4);

  box-shadow:
    0 10px 25px rgba(0,0,0,0.5),
    inset 0 2px 6px rgba(255,255,255,0.6),
    inset 0 -4px 8px rgba(0,0,0,0.3);
}

/* shine */
.link-button::before {
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:70%;
  height:100%;

  background: linear-gradient(
    120deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,0.9) 40%,
    rgba(215,181,109,0.6) 50%,   /* ذهبي داخل اللمعة */
    rgba(200,200,200,0.6) 55%,   /* رمادي داخل اللمعة */
    rgba(255,255,255,0.8) 60%,
    rgba(255,255,255,0) 100%
  );

  transform: skewX(-25deg);
  transition: 0.6s;
}

.link-button:hover::before {
  left:150%;
}

.link-button:hover {
  transform: translateY(-6px) scale(1.05);
  box-shadow:
    0 25px 50px rgba(0,0,0,0.85),
    inset 0 3px 12px rgba(255,255,255,0.8);
}

.link-button:active {
  transform: scale(0.96);
}

.link-button img {
  width:22px;
  height:22px;
  margin-right:15px;
  filter: brightness(0);
}

.link-button span {
  flex:1;
  text-align:center;
  color:#000;
  font-weight:600;
}

/* ===== زر + ===== */
.vcard-btn {
  position: fixed;
  bottom: 25px;
  left: 25px;

  width: 65px;
  height: 65px;
  border-radius: 50%;

  background: linear-gradient(145deg, #f5d27a, #d7b56d);
  color: #000;

  font-size: 36px;
  font-weight: bold;

  border: none;
  cursor: pointer;

  display:flex;
  align-items:center;
  justify-content:center;

  box-shadow:
    0 12px 30px rgba(0,0,0,0.6),
    inset 0 2px 6px rgba(255,255,255,0.6);

  transition: 0.3s;
}

.vcard-btn:hover {
  transform: scale(1.15);
  box-shadow: 0 25px 55px rgba(0,0,0,0.9);
}

.vcard-btn:active {
  transform: scale(0.95);
}

</style>
