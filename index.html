@keyframes backgroundMove {

.container { max-width:500px; margin:auto; }

/* ===== الأزرار ===== */

.link-button {
  display:flex;
  align-items:center;
  padding:16px 20px;
  background: linear-gradient(145deg, #ff1a3d, #cc0022);
  color:white;
  text-decoration:none;
  font-size:18px;
  border-radius:14px;
  margin:12px auto;
  max-width:420px;

  transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
  box-shadow:
    0 6px 12px rgba(0,0,0,0.25),
    inset 0 2px 4px rgba(255,255,255,0.3);
}

.link-button img {
  width:22px;
  height:22px;
  margin-right:15px;
  filter:brightness(0) invert(1);
}

.link-button span {
  flex:1;
  text-align:center;
  color:#fff;
}

.link-button:hover {
  transform: translateY(-4px) scale(1.05);
  border-radius: 22px;
  box-shadow:
    0 18px 30px rgba(0,0,0,0.35),
    inset 0 2px 6px rgba(255,255,255,0.4);
}

.link-button:active {
  transform: translateY(2px) scale(0.98);
}

/* ===== زر vCard ===== */

.vcard-btn {
  position: fixed;
  bottom: 25px;
  left: 25px;

  width: 60px;
  height: 60px;
  border-radius: 50%;

  background: #ffffff;
  color: #e60023;

  font-size: 34px;
  font-weight: bold;

  border: none;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  box-shadow: 0 10px 25px rgba(0,0,0,0.25);

  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.vcard-btn:hover {
  transform: scale(1.12);
  box-shadow: 0 15px 30px rgba(0,0,0,0.35);
}

.vcard-btn:active {
  transform: scale(0.95);
}
